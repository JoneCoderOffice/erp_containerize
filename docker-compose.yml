services:

    backend:
        build:
            context: ../erp_back
            dockerfile: Dockerfile
        ports:
            - "8001:80"
            - "8443:8443"
        depends_on:
            -   db
            - redis
        volumes:
            - ../erp_back:/app
    web:
        build:
            context: ../erp_web
            dockerfile: Dockerfile
        ports:
            - "3001:80"
        depends_on:
            -   backend
        volumes:
            - ../erp_web:/app
    admin:
        build:
            context: ../erp_admin
            dockerfile: Dockerfile
        ports:
            - "3002:3000"
        depends_on:
            - backend
        volumes:
            - ../erp_admin:/app

    db:
        image: postgres:17
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: erp
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
        volumes:
            - dbdata:/var/lib/postgresql/data

    redis:
        image: redis:alpine
        restart: always
        container_name: myapp_redis
        volumes:
            - redisdata:/data
        ports:
            - "6378:6379"

volumes:
    dbdata:
        driver: local
    redisdata:
        driver: local