services:

    backend:
        build:
            context: ${BACKEND_PROJECT_DIR}
            dockerfile: Dockerfile
        ports:
            - "8002:80"
            - "8443:8443"
        depends_on:
            -   db
            - redis
        volumes:
            - ${BACKEND_PROJECT_DIR}:/app
    web:
        build:
            context: ${WEB_PROJECT_DIR}
            dockerfile: Dockerfile
        ports:
            - "3001:80"
        depends_on:
            -   backend
        volumes:
            - ${WEB_PROJECT_DIR}:/app
    admin:
        build:
            context: ${ADMIN_PROJECT_DIR}
            dockerfile: Dockerfile
        ports:
            - "3002:80"
        depends_on:
            - backend
        volumes:
            - ${ADMIN_PROJECT_DIR}:/app

    db:
        image: postgres:17
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - dbdata:/var/lib/postgresql/data

    redis:
        image: redis:alpine
        restart: always
        container_name: myapp_redis
        volumes:
            - redisdata:/data
        ports:
            - "6378:6379"

volumes:
    dbdata:
        driver: local
    redisdata:
        driver: local