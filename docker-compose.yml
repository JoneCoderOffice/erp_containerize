services:

    backend:
        build:
            context: ../erp_back
            dockerfile: Dockerfile
        ports:
            - "8000:80"
            - "8443:8443"
        depends_on:
            -   db
            - redis
        volumes:
            - ../erp_back:/app
    web:
        build:
            context: ../erp_web
            dockerfile: Dockerfile
        ports:
            - "3000:80"
        depends_on:
            -   backend
        volumes:
            - ../erp_web:/app

    db:
        image: postgres
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: erp
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
        volumes:
            - dbdata:/var/lib/postgresql/data

    redis:
        image: redis:alpine
        restart: always
        container_name: myapp_redis
        volumes:
            - redisdata:/data
        ports:
            - "6379:6379"

volumes:
    dbdata:
        driver: local
    redisdata:
        driver: local